name: Android CI Build

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Extract version name
      id: version
      run: |
        VERSION_NAME=$(grep 'versionName =' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)".*/\1/')
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

    # Changed from assembleDebug to assembleRelease
    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/master')
      with:
        tag_name: v${{ steps.version.outputs.version_name }}
        name: QuizGenerator v${{ steps.version.outputs.version_name }}
        # Updated path to the release folder
        files: app/build/outputs/apk/release/*.apk
        token: ${{ secrets.GITHUB_TOKEN }}